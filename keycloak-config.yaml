  - username: ta-user
    email: ta@example.com
    firstName: TA
    lastName: User
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
      - "/Tenants/classroom/TAs"

  - username: instructor-user
    email: instructor@example.com
    firstName: Instructor
    lastName: User
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
