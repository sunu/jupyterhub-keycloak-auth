enabled: true
realm: test-realm
displayName: Test Realm for JupyterHub

clients:
  - clientId: jupyterhub-staging
    name: JupyterHub (Staging)
    rootUrl: $(env:STAGING_HUB_URL)
    secret: $(env:STAGING_CLIENT_SECRET)
    redirectUris:
      - $(env:STAGING_HUB_URL)/hub/oauth_callback
    webOrigins:
      - $(env:STAGING_HUB_URL)
    protocol: openid-connect
    defaultClientScopes:
      - basic
      - profile
      - email
    protocolMappers:
      # Puts client roles into the token as a top-level "roles" claim
      - name: client-roles-claim
        protocol: openid-connect
        protocolMapper: oidc-usermodel-client-role-mapper
        config:
          userinfo.token.claim: "true"
          claim.name: roles
          jsonType.label: String
          multivalued: "true"
          usermodel.clientRoleMapping.clientId: jupyterhub-staging
      # Puts full group paths into the token as a "groups" claim
      - name: groups-claim
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          userinfo.token.claim: "true"
          claim.name: groups
          jsonType.label: String
          multivalued: "true"
          full.path: "true"

  - clientId: jupyterhub-prod
    name: JupyterHub (Prod)
    rootUrl: $(env:PROD_HUB_URL)
    secret: $(env:PROD_CLIENT_SECRET)
    redirectUris:
      - $(env:PROD_HUB_URL)/hub/oauth_callback
    webOrigins:
      - $(env:PROD_HUB_URL)
    protocol: openid-connect
    defaultClientScopes:
      - basic
      - profile
      - email
    protocolMappers:
      - name: client-roles-claim
        protocol: openid-connect
        protocolMapper: oidc-usermodel-client-role-mapper
        config:
          userinfo.token.claim: "true"
          claim.name: roles
          jsonType.label: String
          multivalued: "true"
          usermodel.clientRoleMapping.clientId: jupyterhub-prod
      - name: groups-claim
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          userinfo.token.claim: "true"
          claim.name: groups
          jsonType.label: String
          multivalued: "true"
          full.path: "true"

roles:
  # Realm-scoped tenant roles represent org identity for cost attribution.
  # These do NOT grant compute access on their own; they are consumed by downstream systems for attribution.
  realm:
    - name: tenant:veda
      description: Veda tenant
    - name: tenant:veda/team-1
      description: Team 1 in the Veda tenant
      composites:
        realm:
          - tenant:veda
    - name: tenant:veda/team-2
      description: Team 2 in the Veda tenant
      composites:
        realm:
          - tenant:veda
    - name: tenant:disasters
      description: Disasters tenant
    - name: tenant:classroom
      description: Classroom tenant
    - name: tenant:classroom/students
      description: Students in the Classroom tenant
      composites:
        realm:
          - tenant:classroom
    - name: tenant:classroom/TAs
      description: TAs in the Classroom tenant
      composites:
        realm:
          - tenant:classroom
    - name: tenant:classroom/instructors
      description: Instructors in the Classroom tenant
      composites:
        realm:
          - tenant:classroom
    - name: tenant:research
      description: Research tenant
    - name: tenant:research/project-alpha
      description: Project Alpha in the Research tenant
      composites:
        realm:
          - tenant:research
    - name: tenant:research/project-beta
      description: Project Beta in the Research tenant
      composites:
        realm:
          - tenant:research
    - name: tenant:research/professors
      description: Professors in the Research tenant
      composites:
        realm:
          - tenant:research

  # Client-scoped capability roles grant compute access and other capabilities within a **specific hub instance corresponding to the client**.
  # JupyterHub checks for these roles in the token to determine what compute profiles a user can access and whether they have admin privileges etc.
  client:
    jupyterhub-staging:
      - name: basic-user
        description: Access to standard compute profiles
      - name: power-user
        description: Access to large memory / high CPU profiles
        composites:
          client:
            jupyterhub-staging:
              - basic-user
      - name: gpu-user
        description: Access to GPU profiles
        composites:
          client:
            jupyterhub-staging:
              - basic-user
      - name: admin
        description: JupyterHub admin panel access
        composites:
          client:
            jupyterhub-staging:
              - basic-user
              - power-user

    jupyterhub-prod:
      - name: basic-user
        description: Access to standard compute profiles
      - name: power-user
        description: Access to large memory / high CPU profiles
        composites:
          client:
            jupyterhub-prod:
              - basic-user
      - name: gpu-user
        description: Access to GPU profiles
        composites:
          client:
            jupyterhub-prod:
              - basic-user
      - name: admin
        description: JupyterHub admin panel access
        composites:
          client:
            jupyterhub-prod:
              - basic-user
              - power-user

groups:
  # Capability groups can grant capability roles within a specific hub environment.
  # They are useful for explicitly assigning capabilities to users who don't fit neatly into the tenant group structure
  # (e.g. a user who is in the veda/team-1 subgroup but also needs GPU access, which isn't bundled into their subgroup).
  - name: JupyterHub
    subGroups:
      - name: Staging
        subGroups:
          - name: Basic Users
            clientRoles:
              jupyterhub-staging:
                - basic-user
          - name: Power Users
            clientRoles:
              jupyterhub-staging:
                - power-user
          - name: GPU Users
            clientRoles:
              jupyterhub-staging:
                - gpu-user
          - name: Admins
            clientRoles:
              jupyterhub-staging:
                - admin
      - name: Prod
        subGroups:
          - name: Basic Users
            clientRoles:
              jupyterhub-prod:
                - basic-user
          - name: Power Users
            clientRoles:
              jupyterhub-prod:
                - power-user
          - name: GPU Users
            clientRoles:
              jupyterhub-prod:
                - gpu-user
          - name: Admins
            clientRoles:
              jupyterhub-prod:
                - admin

  # The default group where new users land; can authenticate but have no compute access.
  - name: No Access

  # Tenant groups represent real-world organizational structure.
  # They primarily grant tenant:* realm roles which are mainly used for cost attribution and organizational identity,
  # but they also bundle capability roles at the parent and/or subgroup level for convenient access management.
  # For example, all veda members get staging basic-user. Per-user capability exceptions are
  # handled by additionally assigning /JupyterHub/<Env>/* capability groups.
  - name: Tenants
    subGroups:
      - name: veda
        realmRoles:
          - tenant:veda
        clientRoles:
          jupyterhub-staging:
            - basic-user
        subGroups:
          - name: team-1
            realmRoles:
              - tenant:veda/team-1
          - name: team-2
            realmRoles:
              - tenant:veda/team-2
            clientRoles:
              jupyterhub-staging:
                - power-user
      - name: disasters
        realmRoles:
          - tenant:disasters
        clientRoles:
          jupyterhub-staging:
            - power-user
            - gpu-user
      - name: classroom
        realmRoles:
          - tenant:classroom
        clientRoles:
          jupyterhub-staging:
            - basic-user
        subGroups:
          - name: students
            realmRoles:
              - tenant:classroom/students
          - name: TAs
            realmRoles:
              - tenant:classroom/TAs
            clientRoles:
              jupyterhub-staging:
                - power-user
          - name: instructors
            realmRoles:
              - tenant:classroom/instructors
            clientRoles:
              jupyterhub-staging:
                - admin
      - name: research
        realmRoles:
          - tenant:research
        clientRoles:
          jupyterhub-staging:
            - basic-user
        subGroups:
          - name: project-alpha
            realmRoles:
              - tenant:research/project-alpha
            clientRoles:
              jupyterhub-staging:
                - power-user
          - name: project-beta
            realmRoles:
              - tenant:research/project-beta
            clientRoles:
              jupyterhub-staging:
                - gpu-user
          - name: professors
            realmRoles:
              - tenant:research/professors
            clientRoles:
              jupyterhub-staging:
                - admin

defaultGroups:
  - "/No Access"

# Test users to demonstrate different role and group combinations.
users:
# basic-user-test demonstrates the bundled-capability pattern: /Tenants/veda/team-1
# bundles jupyterhub-staging:basic-user, so no separate capability group is needed.
  - username: basic-user-test
    email: basic@example.com
    firstName: Basic
    lastName: User
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
      - "/Tenants/veda/team-1"
  
  # gpu-user-test demonstrates explicit capability assignment: /Tenants/veda/team-1 does NOT bundle gpu-user role,
  # but the user can be given explicit access by adding them to /JupyterHub/Staging/GPU Users.
  - username: gpu-user-test
    email: gpu@example.com
    firstName: GPU
    lastName: User
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
      - "/Tenants/veda/team-1"
      - "/JupyterHub/Staging/GPU Users"

  - username: power-user-test
    email: power@example.com
    firstName: Power
    lastName: User
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
      - "/Tenants/veda/team-2"

  # explicit admin user without tenant affiliation
  - username: admin-test
    email: admin@example.com
    firstName: Admin
    lastName: User
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
      - "/JupyterHub/Staging/Admins"

  - username: no-access-test
    email: noaccess@example.com
    firstName: NoAccess
    lastName: User
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
      - "/No Access"

  - username: student-user
    email: student@example.com
    firstName: Student
    lastName: User
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
