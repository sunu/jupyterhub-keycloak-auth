  - username: project-alpha-researcher
    email: alpha@example.com
    firstName: Project
    lastName: Alpha Researcher
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
    groups:
      - "/Tenants/research/project-alpha"

  - username: project-beta-researcher
    email: beta@example.com
    firstName: Project
    lastName: Beta Researcher
    enabled: true
    credentials:
      - type: password
        value: password
        temporary: false
